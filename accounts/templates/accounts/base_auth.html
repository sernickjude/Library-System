{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'accounts/main.css' %}">
    {% block css%}
    
    {% endblock  %}
</head>
<body>
    <div class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message.message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    {% block content %}
        <h1>No Content</h1>
    {%endblock%}
    </div>
</body>
</html>
