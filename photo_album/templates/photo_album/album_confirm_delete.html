{% extends 'Library_System/base.html' %}

{% block content %}
<h1>Confirm delete</h1>
<p>Are you sure you want to delete "{{ object.title }}"?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Confirm</button>
  <a href="{% url 'photo_album:album_detail' object.pk %}">Cancel</a>
</form>
{% endblock %}
